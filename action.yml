name: "Deploy to Deno"
description:
  "Checks out the repository and publishes or deletes the project on Deno Deploy.
  If generateEnv is true, they will get published with the deployment environment as well."
inputs:
  action:
    description: "Action to perform: 'deploy' or 'delete' the project."
    required: true
    default: "deploy"
  token:
    description: "Deno token for publishing."
    required: true
  organization:
    description: The organization to target when deploying the project. If omitted, will default to the user account.
    required: false
  production:
    description: "Deploy to production (uses --prod flag)"
    required: false
    default: "true"
  entrypoint:
    description: "The entrypoint to the script that will be deployed."
    required: false
    default: "src/deno.ts"
  generateEnv:
    description: "Generates the .env file based on the current environment if true."
    required: false
    default: "true"
  project_name:
    description: "Overrides the auto-generated Deno Deploy project name."
    required: false
  sourceRef:
    description: "Source branch ref used for deterministic project naming and artifact branch mapping."
    required: false
    default: "${{ github.event.ref || github.event.workflow_run.head_branch || github.ref_name }}"
  artifactPrefix:
    description: "Prefix used for paired artifact branches."
    required: false
    default: "dist/"
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Install CLI
      shell: bash
      run: deno install -gArf jsr:@deno/deployctl

    - name: Resolve source and artifact refs
      shell: bash
      env:
        SOURCE_REF_INPUT: ${{ inputs.sourceRef }}
        ARTIFACT_PREFIX_INPUT: ${{ inputs.artifactPrefix }}
      run: |
        source_ref="$SOURCE_REF_INPUT"
        source_ref="${source_ref#refs/heads/}"
        if [ -z "$source_ref" ]; then
          source_ref="${GITHUB_REF_NAME}"
        fi

        artifact_prefix="$ARTIFACT_PREFIX_INPUT"
        if [ -z "$artifact_prefix" ]; then
          artifact_prefix="dist/"
        fi
        if [[ "$artifact_prefix" != */ ]]; then
          artifact_prefix="${artifact_prefix}/"
        fi

        if [[ "$source_ref" == "$artifact_prefix"* ]]; then
          artifact_ref="$source_ref"
        else
          artifact_ref="${artifact_prefix}${source_ref}"
        fi

        echo "SOURCE_REF=$source_ref" >> "$GITHUB_ENV"
        echo "ARTIFACT_REF=$artifact_ref" >> "$GITHUB_ENV"

    - name: Prepare Environment Variables
      shell: bash
      run: |
        if [ -n "${{ inputs.project_name }}" ]; then
          new_name="${{ inputs.project_name }}"
        else
          # Sanitize both project name and branch name to meet Deno Deploy requirements
          project_name=$(echo "${{ github.event.repository.name }}" | sed 's#[^a-zA-Z0-9]#-#g')
          branch_name=$(echo "$SOURCE_REF" | sed 's#[^a-zA-Z0-9]#-#g')
          new_name="${project_name}-${branch_name}"
        fi

        # Clean up the name to meet Deno Deploy requirements:
        # - Only a-z, 0-9, and - allowed
        # - Must not start or end with hyphen
        # - Cannot exceed 26 characters
        new_name=$(echo "$new_name" | sed 's#[^a-zA-Z0-9-]#-#g' | sed 's#^-*##' | sed 's#-*$##' | cut -c 1-26)

        # Ensure we don't end with a hyphen after truncation
        new_name=$(echo "$new_name" | sed 's#-*$##')

        # Ensure minimum length of 3 characters
        if [ ${#new_name} -lt 3 ]; then
          new_name="${new_name}app"
        fi

        echo "DENO_PROJECT_NAME=$new_name" >> $GITHUB_ENV
        DENO_DEPLOYMENT_ID=${{ github.sha }}
        echo "DENO_DEPLOYMENT_ID=$DENO_DEPLOYMENT_ID" >> $GITHUB_ENV

    # === DEPLOY STEPS ===
    - name: Generate .env File
      if: inputs.action == 'deploy' && inputs.generateEnv == 'true'
      shell: bash
      run: |
        cat > generate-env.ts <<'EOF'
        const envVars = Deno.env.toObject();
        const filtered = Object.entries(envVars)
          .filter(([k, v]) => !/^(GITHUB_|RUNNER_|CI|HOME|PATH|PWD|SHELL|LANG|LC_|TZ|ACTIONS_)/.test(k))
          .filter(([k, v]) => v !== undefined && v !== null && v.trim() !== "")
          .reduce((acc, [k,v]) => ({...acc, [k]:v}), {});
        await Deno.writeTextFile(".env",
          Object.entries(filtered)
            .map(([k,v]) => `${k}="${v.replace(/"/g, '\\"')}"`)
            .join("\n")
        );
        EOF
        deno run --allow-env --allow-write=.env generate-env.ts
        rm generate-env.ts

    - name: Manage Deno Deploy Project (Deploy)
      if: inputs.action == 'deploy'
      shell: bash
      id: deno_project
      env:
        DENO_DEPLOY_TOKEN: ${{ inputs.token }}
      run: |
        deployctl projects create \
          --token=$DENO_DEPLOY_TOKEN \
          --project=$DENO_PROJECT_NAME \
          --force \
          --color=never \
          ${{ inputs.organization && format('--org={0}', inputs.organization) || '' }} || true

        # Construct the deployment URL directly (Deno Deploy URLs follow predictable pattern)
        PROJECT_URL="https://${DENO_PROJECT_NAME}.deno.dev"

        echo "PROJECT_URL=$PROJECT_URL" >> $GITHUB_ENV
        echo "deployment_url=$PROJECT_URL" >> $GITHUB_OUTPUT

    - name: Update manifest.json with deployment URL
      if: inputs.action == 'deploy'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const manifestPath = path.resolve("${{ github.workspace }}", './manifest.json');

          if (!fs.existsSync(manifestPath)) {
            console.log('manifest.json not found. Skipping update.');
            return;
          }

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          manifest["homepage_url"] = "${{ steps.deno_project.outputs.deployment_url }}";

          const updatedManifest = JSON.stringify(manifest, null, 2);
          fs.writeFileSync(manifestPath, updatedManifest);
          console.log('Updated manifest:', updatedManifest);

    - name: Deploy to Deno
      if: inputs.action == 'deploy'
      shell: bash
      env:
        DENO_DEPLOY_TOKEN: ${{ inputs.token }}
      run: |
        deployctl deploy \
          --token=$DENO_DEPLOY_TOKEN \
          --project=$DENO_PROJECT_NAME \
          --entrypoint=${{ inputs.entrypoint }} \
          ${{ inputs.generateEnv == 'true' && '--env-file=.env' || '' }} \
          ${{ inputs.production == 'true' && '--prod' || '' }}

    - name: Get GitHub App token
      if: env.APP_ID != '' && env.APP_PRIVATE_KEY != ''
      uses: actions/create-github-app-token@v1
      id: app-token
      with:
        app-id: ${{ env.APP_ID }}
        private-key: ${{ env.APP_PRIVATE_KEY }}

    - name: Check if manifest.json exists
      id: check_manifest
      if: inputs.action == 'deploy'
      shell: bash
      run: |
        if [ -f manifest.json ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Format manifest using Prettier
      shell: bash
      if: inputs.action == 'deploy' && steps.check_manifest.outputs.exists == 'true'
      continue-on-error: true
      run: |
        npx prettier --write manifest.json

    - name: Publish manifest.json to artifact branch
      if: inputs.action == 'deploy' && steps.check_manifest.outputs.exists == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ steps.app-token.outputs.token || env.GITHUB_TOKEN || github.token }}
        script: |
          const fs = require("fs");
          const path = require("path");

          const manifestPath = path.resolve(process.env.GITHUB_WORKSPACE, "manifest.json");
          const manifestContent = fs.readFileSync(manifestPath, "utf8");
          const sourceRef = process.env.SOURCE_REF;
          const artifactRef = process.env.ARTIFACT_REF;
          const artifactBranchRef = `heads/${artifactRef}`;
          const { owner, repo } = context.repo;

          async function resolveBaseSha() {
            try {
              const { data } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${sourceRef}`,
              });
              return data.object.sha;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const { data: repository } = await github.rest.repos.get({ owner, repo });
              const { data: defaultRef } = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${repository.default_branch}`,
              });
              core.warning(
                `Source ref '${sourceRef}' not found, using '${repository.default_branch}' as artifact base.`
              );
              return defaultRef.object.sha;
            }
          }

          async function ensureArtifactBranch() {
            try {
              await github.rest.git.getRef({ owner, repo, ref: artifactBranchRef });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const baseSha = await resolveBaseSha();
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${artifactBranchRef}`,
                sha: baseSha,
              });
              core.notice(`Created artifact branch '${artifactRef}'.`);
            }
          }

          async function getManifestState() {
            try {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path: "manifest.json",
                ref: artifactRef,
              });
              if (Array.isArray(data)) {
                return { sha: undefined, content: null };
              }
              const decoded = Buffer.from(data.content, data.encoding || "base64").toString("utf8");
              return { sha: data.sha, content: decoded };
            } catch (error) {
              if (error.status === 404) {
                return { sha: undefined, content: null };
              }
              throw error;
            }
          }

          await ensureArtifactBranch();
          const existingManifest = await getManifestState();
          if (existingManifest.content === manifestContent) {
            core.info(`manifest.json is unchanged on '${artifactRef}', skipping commit.`);
            return;
          }

          await github.rest.repos.createOrUpdateFileContents({
            owner,
            repo,
            path: "manifest.json",
            message: "chore: [skip ci] update manifest.json url",
            content: Buffer.from(manifestContent, "utf8").toString("base64"),
            branch: artifactRef,
            ...(existingManifest.sha ? { sha: existingManifest.sha } : {}),
          });

          core.notice(`Updated manifest.json on '${artifactRef}'.`);
      env:
        SOURCE_REF: ${{ env.SOURCE_REF }}
        ARTIFACT_REF: ${{ env.ARTIFACT_REF }}

    - name: Write Deployment URL to Summary
      if: inputs.action == 'deploy'
      shell: bash
      run: |
        echo "### Deployment URL" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.deno_project.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Artifact branch: \`${ARTIFACT_REF}\`" >> $GITHUB_STEP_SUMMARY

    # === DELETE STEP ===
    - name: Delete Deno Deploy Project
      if: inputs.action == 'delete'
      shell: bash
      env:
        DENO_DEPLOY_TOKEN: ${{ inputs.token }}
      run: |
        deployctl projects delete \
          --token=$DENO_DEPLOY_TOKEN \
          --project=$DENO_PROJECT_NAME \
          --force \
          --color=never || true

    - name: Delete paired artifact branch
      if: inputs.action == 'delete'
      uses: actions/github-script@v7
      with:
        github-token: ${{ steps.app-token.outputs.token || env.GITHUB_TOKEN || github.token }}
        script: |
          const { owner, repo } = context.repo;
          const artifactRef = process.env.ARTIFACT_REF;
          try {
            await github.rest.git.deleteRef({ owner, repo, ref: `heads/${artifactRef}` });
            core.notice(`Deleted artifact branch '${artifactRef}'.`);
          } catch (error) {
            if (error.status === 404) {
              core.info(`Artifact branch '${artifactRef}' does not exist. Skipping deletion.`);
              return;
            }
            throw error;
          }
      env:
        ARTIFACT_REF: ${{ env.ARTIFACT_REF }}

    - name: Write Deletion to Summary
      if: inputs.action == 'delete'
      shell: bash
      run: |
        echo "### Deletion Summary" >> $GITHUB_STEP_SUMMARY
        echo "Deployment \`${DENO_PROJECT_NAME}\` and artifact branch \`${ARTIFACT_REF}\` have been deleted." >> $GITHUB_STEP_SUMMARY
