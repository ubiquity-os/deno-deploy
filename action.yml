name: "Deploy to Deno"
description: "Provisions Deno Deploy apps, syncs environment variables, and maintains dist/* manifest artifacts."
inputs:
  action:
    description: "Action to perform: 'provision' or 'delete'."
    required: true
    default: "provision"
  token:
    description: "Deno Deploy token used for app management, env sync, deploys, deletion, and direct organization inference."
    required: false
  organization:
    description: "Optional Deno Deploy organization slug. When omitted, provision infers it directly from the token and requires an unambiguous single-org token."
    required: false
  app:
    description: "Optional base Deno Deploy app slug override. Defaults to the sanitized repository name."
    required: false
  entrypoint:
    description: "Entrypoint used for the app runtime configuration."
    required: false
    default: "src/deno.ts"
outputs:
  app_slug:
    description: "Resolved Deno Deploy app slug."
    value: ${{ steps.provision.outputs.app_slug }}
  homepage_url:
    description: "Published homepage_url written to dist/* manifest.json when available."
    value: ${{ steps.provision.outputs.homepage_url }}
runs:
  using: "composite"
  steps:
    - name: Setup Deno
      uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x

    - name: Resolve action context
      id: resolve
      shell: bash
      env:
        ACTION_INPUT: ${{ inputs.action }}
        APP_INPUT: ${{ inputs.app }}
        DEFAULT_BRANCH_INPUT: ${{ github.event.repository.default_branch }}
        DELETE_REF_INPUT: ${{ github.event.ref || '' }}
        EVENT_NAME_INPUT: ${{ github.event_name }}
        EVENT_REF_TYPE_INPUT: ${{ github.event.ref_type || '' }}
        REPO_NAME_INPUT: ${{ github.event.repository.name }}
        REF_NAME_INPUT: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        action="$ACTION_INPUT"
        case "$action" in
          provision|delete) ;;
          *)
            echo "::error::Unsupported action '$action'. Expected 'provision' or 'delete'."
            exit 1
            ;;
        esac

        # As observed locally on 2026-04-06, missing Deno app slugs longer than
        # 32 characters can return 400 Invalid UUID from /v2/apps/{slug}
        # instead of 404. Cap generated slugs at 32 so slug-based lookup keeps
        # the current create-if-missing flow working.
        slugify() {
          local value="$1"
          value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
          printf '%s' "$value"
        }

        trim_slug() {
          local value="$1"
          local limit="$2"
          if [ "${#value}" -gt "$limit" ]; then
            value="${value:0:$limit}"
          fi
          value="$(printf '%s' "$value" | sed -E 's/-+$//')"
          printf '%s' "$value"
        }

        raw_app="$APP_INPUT"
        if [ -z "$raw_app" ]; then
          raw_app="$REPO_NAME_INPUT"
        fi

        ref_name="$REF_NAME_INPUT"
        if [ "$EVENT_NAME_INPUT" = "delete" ] && [ -n "$DELETE_REF_INPUT" ]; then
          ref_name="$DELETE_REF_INPUT"
        fi
        ref_name="${ref_name#refs/heads/}"
        ref_name="${ref_name#refs/tags/}"

        max_total_length=32
        base_app_slug="$(slugify "$raw_app")"
        if [ -z "$base_app_slug" ]; then
          base_app_slug="app"
        fi
        while [ "${#base_app_slug}" -lt 3 ]; do
          base_app_slug="${base_app_slug}app"
        done
        base_app_slug="$(trim_slug "$base_app_slug" "$max_total_length")"

        app_slug="$base_app_slug"
        if [ "$ref_name" != "main" ] && [ -n "$ref_name" ]; then
          branch_suffix="$(slugify "$ref_name")"
          if [ -z "$branch_suffix" ]; then
            branch_suffix="branch"
          fi

          max_branch_suffix_length=25
          available_suffix_budget=$((max_total_length - ${#base_app_slug} - 1))
          if [ "$available_suffix_budget" -lt 1 ]; then
            base_app_slug="$(trim_slug "$base_app_slug" $((max_total_length - 2)))"
            available_suffix_budget=$((max_total_length - ${#base_app_slug} - 1))
          fi

          suffix_budget="$max_branch_suffix_length"
          if [ "$available_suffix_budget" -lt "$suffix_budget" ]; then
            suffix_budget="$available_suffix_budget"
          fi
          if [ "$suffix_budget" -lt 1 ]; then
            suffix_budget=1
          fi

          branch_suffix="$(trim_slug "$branch_suffix" "$suffix_budget")"
          if [ -z "$branch_suffix" ]; then
            branch_suffix="b"
          fi

          app_slug="${base_app_slug}-${branch_suffix}"
        fi

        is_tag_ref="false"
        if [ "$EVENT_REF_TYPE_INPUT" = "tag" ] || [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
          is_tag_ref="true"
        fi

        is_dist_ref="false"
        if [[ "$ref_name" == dist/* ]]; then
          is_dist_ref="true"
        fi

        should_skip="false"
        skip_reason=""

        case "$action" in
          provision)
            if [ "$is_tag_ref" = "true" ]; then
              should_skip="true"
              skip_reason="tag refs are not supported"
            elif [ "$is_dist_ref" = "true" ]; then
              should_skip="true"
              skip_reason="dist branches are ignored"
            fi
            ;;
          delete)
            if [ "$EVENT_NAME_INPUT" != "delete" ]; then
              should_skip="true"
              skip_reason="delete only handles GitHub delete events"
            elif [ "$EVENT_REF_TYPE_INPUT" != "branch" ] && [ -n "$EVENT_REF_TYPE_INPUT" ]; then
              should_skip="true"
              skip_reason="delete only handles branch deletions"
            elif [ "$is_tag_ref" = "true" ]; then
              should_skip="true"
              skip_reason="tag deletions are ignored"
            elif [ "$is_dist_ref" = "true" ]; then
              should_skip="true"
              skip_reason="dist branches are ignored"
            fi
            ;;
        esac

        artifact_ref=""
        if [ -n "$ref_name" ]; then
          artifact_ref="dist/$ref_name"
        fi

        echo "action_mode=$action" >> "$GITHUB_OUTPUT"
        echo "app_slug=$app_slug" >> "$GITHUB_OUTPUT"
        echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
        echo "artifact_ref=$artifact_ref" >> "$GITHUB_OUTPUT"
        echo "default_branch=$DEFAULT_BRANCH_INPUT" >> "$GITHUB_OUTPUT"
        echo "should_skip=$should_skip" >> "$GITHUB_OUTPUT"
        echo "skip_reason=$skip_reason" >> "$GITHUB_OUTPUT"

    - name: Skip unsupported invocation
      if: ${{ steps.resolve.outputs.should_skip == 'true' }}
      shell: bash
      env:
        ACTION_MODE: ${{ steps.resolve.outputs.action_mode }}
        SKIP_REASON: ${{ steps.resolve.outputs.skip_reason }}
      run: |
        echo "::notice::Skipping '$ACTION_MODE' (${SKIP_REASON})."

    - name: Validate required inputs
      if: ${{ steps.resolve.outputs.should_skip != 'true' }}
      shell: bash
      env:
        ACTION_MODE: ${{ steps.resolve.outputs.action_mode }}
        ORGANIZATION_INPUT: ${{ inputs.organization }}
        TOKEN_INPUT: ${{ inputs.token }}
      run: |
        set -euo pipefail

        case "$ACTION_MODE" in
          provision)
            if [ -z "$TOKEN_INPUT" ]; then
              echo "::error::The 'token' input is required for provision."
              exit 1
            fi
            ;;
          delete)
            if [ -z "$TOKEN_INPUT" ]; then
              echo "::error::The 'token' input is required for delete."
              exit 1
            fi
            ;;
        esac

    - name: Get GitHub App token
      if: ${{ steps.resolve.outputs.should_skip != 'true' && env.APP_ID != '' && env.APP_PRIVATE_KEY != '' }}
      uses: actions/create-github-app-token@v1
      id: app-token
      with:
        app-id: ${{ env.APP_ID }}
        private-key: ${{ env.APP_PRIVATE_KEY }}

    - name: Provision Deno app
      if: ${{ steps.resolve.outputs.action_mode == 'provision' && steps.resolve.outputs.should_skip != 'true' }}
      id: provision
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEFAULT_BRANCH: ${{ steps.resolve.outputs.default_branch }}
        DENO_API_TOKEN: ${{ inputs.token }}
        DENO_APP_SLUG: ${{ steps.resolve.outputs.app_slug }}
        ENTRYPOINT: ${{ inputs.entrypoint }}
        GITHUB_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO: ${{ github.event.repository.name }}
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token || env.GITHUB_TOKEN || github.token }}
        ORGANIZATION: ${{ inputs.organization }}
        REF_NAME: ${{ steps.resolve.outputs.ref_name }}
        REPO_ROOT: ${{ github.workspace }}
      run: |
        set -euo pipefail

        deno run \
          --allow-env \
          --allow-read="$ACTION_PATH,$GITHUB_WORKSPACE" \
          --allow-write="$GITHUB_WORKSPACE,$GITHUB_OUTPUT${GITHUB_STEP_SUMMARY:+,$GITHUB_STEP_SUMMARY}" \
          --allow-run=git,deno \
          --allow-net=api.deno.com,api.github.com \
          "$ACTION_PATH/scripts/provision.js"

    - name: Delete branch app and paired dist branch
      if: ${{ steps.resolve.outputs.action_mode == 'delete' && steps.resolve.outputs.should_skip != 'true' }}
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        ARTIFACT_REF: ${{ steps.resolve.outputs.artifact_ref }}
        DENO_API_TOKEN: ${{ inputs.token }}
        DENO_APP_SLUG: ${{ steps.resolve.outputs.app_slug }}
        GITHUB_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO: ${{ github.event.repository.name }}
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token || env.GITHUB_TOKEN || github.token }}
      run: |
        set -euo pipefail

        deno run \
          --allow-env \
          --allow-read="$ACTION_PATH" \
          --allow-net=api.deno.com,api.github.com \
          "$ACTION_PATH/scripts/delete_dist_branch.js"
